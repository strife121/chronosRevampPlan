services:
  - type: web
    name: indi-redesign-sizing
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATA_FILE
        value: /var/data/sizing.json
      - key: PRIVATE_LINK_TOKEN
        sync: false
    disk:
      name: indi-redesign-sizing-data
      mountPath: /var/data
      sizeGB: 1
