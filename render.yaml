services:
  - type: web
    name: indi-redesign-sizing
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PRIVATE_LINK_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SIZING_DOCUMENT_KEY
        value: indi-redesign-sizing
